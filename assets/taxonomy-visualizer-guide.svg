<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title description">
  <title id="title">Taxonomy Visualizer quick-start illustration</title>
  <desc id="description">A three-step visual guide showing a group selector, a search field, and an expandable taxonomy tree.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf8ef"/>
      <stop offset="1" stop-color="#f2f7f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#285238" flood-opacity=".12"/>
    </filter>
    <style>
      .card { fill:#fff; stroke:#d6e5d9; stroke-width:2; }
      .label { fill:#31543c; font-family:Georgia,serif; font-size:18px; font-weight:700; }
      .small { fill:#6d7f72; font-family:Arial,sans-serif; font-size:13px; }
      .number { fill:#fff; font-family:Arial,sans-serif; font-size:18px; font-weight:800; text-anchor:middle; dominant-baseline:central; }
      .line { fill:none; stroke:#8fb59a; stroke-width:3; stroke-linecap:round; }
    </style>
  </defs>
  <rect width="960" height="600" rx="34" fill="url(#paper)"/>
  <path d="M-30 130C160 60 188 268 356 202S625 45 990 132" fill="none" stroke="#dbead9" stroke-width="38" opacity=".45"/>
  <path d="M-40 474C192 391 319 588 527 488S782 374 1000 464" fill="none" stroke="#e7efe1" stroke-width="42" opacity=".9"/>

  <g filter="url(#shadow)">
