name: Refresh Taxonomy Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh taxonomy assets
        run: |
          python scripts/refresh_taxonomy.py \
            --output-dir data \
            --changes-file data/taxa_changes.json \
            --snapshot-file data/taxa_snapshot.json \
            --lookback-days 30

      - name: Verify split taxonomy parity
        run: |
          python -m unittest discover -s tests -p 'test_refresh_fetch.py' -v
          python -m unittest discover -s tests -p 'test_refresh_parity.py' -v
          python -m unittest discover -s tests -p 'test_generate_terminal_nodes.py' -v
          python -m unittest discover -s tests -p 'test_generate_terminal_node_occurrences.py' -v
          node --experimental-default-type=module --test tests/test_taxon_summary.mjs
          node --experimental-default-type=module --test tests/test_hover.mjs
          node --experimental-default-type=module --test tests/test_search_query.mjs
          node --experimental-default-type=module --test tests/test_group_anomaly_rows.mjs
          node --experimental-default-type=module --test tests/test_group_tree_rows.mjs
          node --experimental-default-type=module --test tests/test_initial_view.mjs
          node --experimental-default-type=module --test tests/test_navigation_rows.mjs
          node --experimental-default-type=module --test tests/test_taxonomy_index.mjs
          node --experimental-default-type=module --test tests/test_refresh_tree.mjs

      - name: Commit refreshed files
        shell: bash
        run: |
          if git diff --quiet -- data/; then
            echo "No taxonomy data changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/taxon_names.json data/taxon_paths_ids.json data/taxagroup_names.json data/all_synonyms.json data/taxon_metadata.json data/taxa_changes.json data/taxa_snapshot.json
          git commit -m "chore: refresh taxonomy data"
          git push
