name: Refresh Taxonomy Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh taxonomy assets
        run: |
          python scripts/refresh_taxonomy.py \
            --output-dir data \
            --changes-file data/taxa_changes.json \
            --snapshot-file data/taxa_snapshot.json \
            --lookback-days 30

      - name: Commit refreshed files
        shell: bash
        run: |
          if git diff --quiet -- data/; then
            echo "No taxonomy data changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/taxonpaths.json data/taxagroup_names.json data/all_synonyms.json data/taxon_metadata.json data/taxa_changes.json data/taxa_snapshot.json
          git commit -m "chore: refresh taxonomy data"
          git push
