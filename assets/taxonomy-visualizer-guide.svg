    <rect x="81" y="174" width="194" height="48" rx="10" fill="#f7faf6" stroke="#b8d7be"/>
    <path d="m247 193 8 8 8-8" fill="none" stroke="#42834e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="81" y="280" width="194" height="48" rx="10" fill="#f7faf6" stroke="#b8d7be"/>
    <circle cx="252" cy="304" r="11" fill="none" stroke="#42834e" stroke-width="3"/>
